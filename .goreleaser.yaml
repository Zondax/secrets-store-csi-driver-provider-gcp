# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2
project_name: secrets-store-csi-driver-provider-gcp
before:
  hooks:
    - go vet ./...
    - gofmt -l -s -d .
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -extldflags '-static' -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    main: ./main.go
archives:
  - formats: 
      - tar.xz
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - '^ci:' 
checksum:
  name_template: 'checksums.txt'
release:
  disable: true
dockers:
  - image_templates:
      - "zondax/{{ .ProjectName }}:{{ .Version }}-amd64"
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--platform=linux/amd64"
  - image_templates:
      - "zondax/{{ .ProjectName }}:{{ .Version }}-arm64"
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--platform=linux/arm64"
docker_manifests:
  - name_template: "zondax/{{ .ProjectName }}:{{ .Version }}"
    image_templates:
      - "zondax/{{ .ProjectName }}:{{ .Version }}-amd64"
      - "zondax/{{ .ProjectName }}:{{ .Version }}-arm64"
  - name_template: "zondax/{{ .ProjectName }}:latest"
    image_templates:
      - "zondax/{{ .ProjectName }}:{{ .Version }}-amd64"
      - "zondax/{{ .ProjectName }}:{{ .Version }}-arm64"
