apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: generic-wif-secrets
spec:
  parameters:
    # Set the actual WIF audience for your dev environment
    wif.audience: "//iam.googleapis.com/projects/123456789/locations/global/workloadIdentityPools/dev-pool/providers/my-provider"
    
    # Configure the actual secrets for your dev environment
    secrets: |
      - resourceName: "projects/my-dev-project/secrets/app-config/versions/latest"
        path: "app-config.json"
      - resourceName: "projects/my-dev-project/secrets/app-credentials/versions/latest"
        path: "app-credentials.txt"
        mode: 0400 