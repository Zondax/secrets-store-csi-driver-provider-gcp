apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: generic-wif-secrets
spec:
  parameters:
    # Set the actual WIF audience for your production environment
    wif.audience: "//iam.googleapis.com/projects/987654321/locations/global/workloadIdentityPools/prod-pool/providers/my-provider"
    
    # Configure the actual secrets for your production environment
    secrets: |
      - resourceName: "projects/my-prod-project/secrets/app-config/versions/latest"
        path: "app-config.json"
      - resourceName: "projects/my-prod-project/secrets/app-credentials/versions/latest"
        path: "app-credentials.txt"
        mode: 0400
      - resourceName: "projects/my-prod-project/secrets/additional-config/versions/latest"
        path: "additional-config.json" 