apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: generic-wif-secrets
spec:
  provider: gcp
  parameters:
    # Use generic-wif authentication method
    auth: "generic-wif"
    # This will be overridden in the overlay
    wif.audience: "TO_BE_REPLACED_IN_OVERLAY"
    # Secret configuration will be specified in the overlay
    secrets: |
      - resourceName: "projects/PROJECT_ID/secrets/SECRET_NAME/versions/latest"
        path: "secret.txt" 